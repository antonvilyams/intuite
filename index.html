<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intuite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a href="index.html" class="logo" aria-label="Intuite — home">
        <picture>
          <source srcset="images/logo@3x.png" type="image/png" />
          <img
            class="logo__img"
            src="images/logo@3x.svg"
            width="168"
            height="56"
            alt="Intuite"
          />
        </picture>
      </a>
    </header>

    <main>
      <div id="gallery" class="gallery" aria-live="polite"></div>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <a href="index.html" class="site-footer__logo logo" aria-label="Intuite — home">
          <picture>
            <source srcset="images/logo@3x.png" type="image/png" />
            <img
              class="logo__img logo__img--footer"
              src="images/logo@3x.svg"
              width="142"
              height="63"
              alt="Intuite"
            />
          </picture>
        </a>
        <p class="site-footer__text">
          <span class="site-footer__copy site-footer__copy--mobile">
            Curated model management.<br />
            Hand-selected talent for<br />
            fashion, beauty, and editorial<br />
            worldwide © <span class="site-footer__year"></span>
          </span>
          <span class="site-footer__copy site-footer__copy--desktop">
            Curated model management. Hand-selected talent for fashion, beauty,<br />
            and editorial worldwide © <span class="site-footer__year"></span>
          </span>
        </p>
      </div>
    </footer>

    <script src="js/footer.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
