<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intuite Agency</title>
    <meta
      name="description"
      content="Intuite Agency ✾ Curated model management. Hand-selected talent for fashion, beauty, and editorial worldwide"
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://intuiteagency.com/" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://intuiteagency.com/" />
    <meta property="og:title" content="Intuite Agency" />
    <meta
      property="og:description"
      content="Intuite Agency ✾ Curated model management. Hand-selected talent for fashion, beauty, and editorial worldwide"
    />
    <meta property="og:site_name" content="Intuite" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a href="index.html" class="logo" aria-label="Intuite — home">
        <picture>
          <source srcset="images/logo@3x.png" type="image/png" />
          <img
            class="logo__img"
            src="images/logo@3x.svg"
            width="168"
            height="56"
            alt="Intuite"
          />
        </picture>
      </a>
    </header>

    <main>
      <div id="gallery" class="gallery" aria-live="polite"></div>

      <section class="brands" aria-labelledby="brands-heading">
        <h2 id="brands-heading" class="brands__heading">Brands</h2>
        <div class="brands__grid">
          <div class="brands__item">
            <img
              class="brands__logo"
              src="images/brands/Bottega-Veneta-Logo.png"
              alt="Bottega Veneta"
              loading="lazy"
            />
          </div>
          <div class="brands__item">
            <img
              class="brands__logo"
              src="images/brands/Coach-logo.png"
              alt="Coach New York"
              loading="lazy"
            />
          </div>
          <div class="brands__item">
            <img
              class="brands__logo"
              src="images/brands/Tory-Burch-Logo.png"
              alt="Tory Burch"
              loading="lazy"
            />
          </div>
          <div class="brands__item">
            <img
              class="brands__logo"
              src="images/brands/Athleta-Logo.png"
              alt="Athleta"
              loading="lazy"
            />
          </div>
        </div>
      </section>

      <section class="contact" id="contact-section">
        <div class="contact__stage">
          <div class="contact__form-wrap" id="contact-form-wrap">
            <h2 id="contact-heading" class="contact__heading">Contact Us</h2>
            <form id="contact-form" class="contact__form" novalidate>
              <p class="contact__field">
                <label class="contact__label" for="contact-name">Name</label>
                <input
                  class="contact__input"
                  type="text"
                  id="contact-name"
                  name="name"
                  autocomplete="name"
                  required
                />
              </p>
              <p class="contact__field">
                <label class="contact__label" for="contact-email">Email</label>
                <input
                  class="contact__input"
                  type="email"
                  id="contact-email"
                  name="email"
                  autocomplete="email"
                  required
                />
              </p>
              <p class="contact__field">
                <label class="contact__label" for="contact-message">Message</label>
                <textarea
                  class="contact__input contact__input--textarea"
                  id="contact-message"
                  name="message"
                  rows="5"
                  required
                ></textarea>
              </p>
              <input
                type="text"
                name="_honey"
                class="contact__honeypot"
                tabindex="-1"
                autocomplete="off"
                aria-hidden="true"
              />
              <p class="contact__actions">
                <button class="contact__submit" type="submit">Send</button>
              </p>
              <p
                id="contact-status"
                class="contact__status"
                role="status"
                aria-live="polite"
              ></p>
            </form>
          </div>
          <p
            id="contact-success"
            class="contact__success"
            role="status"
            aria-live="polite"
            aria-hidden="true"
          >
            Thank you. Your message has been sent.
          </p>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p class="site-footer__text">
        Curated model management.<br />
        Hand-selected talent for fashion, beauty, and editorial worldwide.<br />
        Intuite Agency © <time class="js-footer-year" datetime="2026">2026</time>
      </p>
    </footer>

    <button
      class="contact-fab"
      id="contact-fab"
      type="button"
      aria-label="Scroll to Contact Us"
    >
      <img
        class="contact-fab__icon"
        src="images/envelope@3x.png"
        width="40"
        height="28"
        alt=""
      />
    </button>

    <script src="js/footer.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
